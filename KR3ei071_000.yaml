body:
  text: 總論盡萬物而觀之山無不草木地無不黍稷人無不生育要之得其養耳得其養則磽者肥瘠者沃草木何懼乎不蕃黍稷何懼乎不秀夫人亦由是也苟形質強壯而嗜欲無節人之不免虛衰賦稟怯薄而攝養有道終焉亦能完實不特少健而老衰早壯而晚憊滋悟保護之間固可以視秋冬而復春夏也昔者名醫羅天益其年戊午春桃李始華雨雪厚寸一園叟令舉家擊悶墮雪焚草於下是年他果蕭然而此園大熟然則天地之氣尚可以力轉移於人之身豈無所用其術哉橋乃不慚愚昧積以平日所聞縉紳方士之說質諸古今名家論議著為調理精血直指真源男女服藥三論陰陽虛實四圖合用方法三十五道附錄經驗秘方號曰廣嗣要語精切曉明纖芥非隱信此以行將見天下無不可父之男無不可母之女而螽斯之應比屋皆然矣調理精血論求嗣之要在乎男精女血充滿而無病也苟或病焉必資明醫而證調之夫精者血也水也陰也蓋以有形言之也有形而能時者則又為氣為火為陽所使然也論曰孤陽不生獨陰不成無陰則陽無所附無陽則陰無所依是精兼氣血兼水火兼陰陽總屬腎與命門二脈以沉靜為平若見命門脈微細或絕陽事痿弱是為陽虛法當補陽若見命門脈洪大鼓擊陽事堅舉是焉相火妄動法當滋陰制火啟玄子云性水之主以制陽光正此謂也若見腎脈洪大或數遺精尿血是為陰虛法當補陰若見腎脈虛微太甚別無相火為病法當陰陽雙補又如經者血也水也陰也假火色而為赤也隨氣而行依陽以運亦若精之兼氣血兼水火兼陰陽者也其候以一月為期上應月之盈缺故名月水應其期則平失其期則病先期者血熱也過期者血虛也過期而色淡者有痰也或曰虛也經行而成塊者血之凝也或曰風冷乘之也將行而作疼者氣之滯也行後而疼者氣血俱虛也經水紫黑色者氣血俱熱也雖然又當察其時之寒暄脈之遲數證之冷熱平而調之以復常候不可一途而取夫男女精血既充別無他疾惟守投虛之法是為知要直指真源論結胎者男女精血也男屬陽而象乾乾道資始女屬陰而象坤坤道資生陽主動故能施與陰主靜故能承受夫動靜相參陰陽相會必有其時乃成胎孕凡經盡一日至三日新血未盛精勝其血血開裹精精入為骨男胎成矣四日至九日新血漸長血勝其精精開裹血血入居本女胎成矣六日至七日鮮有成者縱成亦皆女胎欲求子者全在經靜三日以里交合如俯首拾芥萬舉萬當斯時男女無暴怒毋醉飽毋食炙爆辛熱毋用他術贊益陰陽和平精血調暢交而必孕孕而必育育而為子堅壯強壽至真切要在此數語受妊之後宜令鎮靜血氣安和則胎孕長養又須內遠七情外薄五味大冷大熱之物皆在所禁苟無胎痛胎動漏血瀉痢及風寒外邪不可輕易服藥亦不得交合陰陽觸動欲火未產則胎動不常既產則胎毒不已降生之後攝養一如胎前蓋母食熱則乳熱母食寒則乳寒母食膏粱釁烈之物則乳毒有是數者子受其害矣求嗣之道誠不出此然源頭一節尤當研究男子十六而精通必三十而娶女子十四而天癸至必二十而嫁皆欲陰陽二氣完實或精未通而御女經始至而近男未完而傷未實而動根本既薄枝葉必衰嗣續豈能蕃衍先儒嘗言寡欲則有子蓋寡欲則不妄交合積氣儲精待時而動故能有子愚謂不止此為寡欲凡心有所動即是欲心主血而藏神屬手少陰腎主精而藏志局足少陰心神外馳則腎志內亂其於交會之際殊無靜一清寧之氣所泄之物同歸腐濁而已安能發育長養於其間哉書曰人心惟危道心惟微夫能精一道心俾常為一身之主則邪思妄念自爾退聽欲寡而神益完不惟多子抑且多壽蓋養生尤貴於寡欲故也男女服藥論男子以陽用事從乎火而主動動則諸陽生女子以陰用事從乎水而主靜靜則眾陰集故治男子毋過溫熱以助其陽治女子無過寒涼以益其陰古人黃柏知母之藥每用於男子而乾薑艾葉之劑慎施於婦人男女陰陽自然之體固有不得而同者至於七情內傷六淫外浸發為諸病治熱以寒制寒以熱隨證推移安能執此但男女嗣續稍遲雖無疾病當加調護男子陽動之體惟慮合而易失未獲中其肯綮女人陰靜之質多苦交而弗孕不能遂其生成由是培養之術若不可廢在男子則用思仙丹收固真陰以為持久之計在女子則用啟榮丸鼓作微陽以為發育之基竊觀古今種子諸方不偏於寒即偏於熱務張其功以矜世不析其理以示人往往服之反致求全之毀故述二方以為世之求嗣者助焉交會宜忌日宜旺相吉日春甲乙寅卯夏丙丁巳午秋庚辛申酉冬壬癸亥子忌弦望晦朔大風大雨虹霓雷電雲霧昏暝日月薄蝕三光之下及春秋冬丙丁日本命乃劬勞之日亦不可行也上宜謹之慎之實陽能入虛陰謂男子陽精充實適值女人經後血海虛靜子宮正開與之交合是謂投虛一舉而成胎矣經靜一日交會者成男二日者成女三日成男四日成女五日成男六日成女取奇陽偶陰之義六日無用矣大抵前三日新血未盛精勝其血血開裹精必成男胎後三日新血漸長血勝其精精開裹血多成女胎交合得夜半後生氣時有子皆男而壽實陰不能受陽謂女人經盡六日之後新血方盛血海充滿若與交合以實投實多不成胎又有婦人素稟怯弱雖經後旬日血海未滿亦覆成胎然皆女子亦血勝其精故也弱陰不能攝陽謂女人陰血衰弱雖投真陽強盛之精不能攝入子宮是以交而不孕孕而不育或因病後產後經後將理失宜勞動過節虧損陰血所致治宜調經養血微陽不能射陰謂男子陽精微薄雖遇女人血海虛靜之日流而不射多不成胎蓋因平時嗜欲不節施泄太多所致法當補益精元兼用工夫存養無令妄動候陽精充實才授投虛之法一舉而成矣兩尺脈洪大或數小便常赤未交易興既交易泄或自遺夢遺真精不固治在補陰兩尺脈微或遲小便常清陽事不舉勉力入房未竟先痿或所泄清冷微薄治在補陽診婦人有妊歌肝為血兮肺為氣血為榮兮氣為衛陰陽配偶不參差兩臟通和皆類例血衰氣旺定無娠血旺氣衰應有體尺微關滑尺帶數流利往來並雀啄小兒之脈已見形數月懷胎猶未覺左疾為男右為女流利相通速來去兩手關脈大相應已形亦在通前語左手帶縱兩個男右手帶橫一雙女左手脈逆生三男右手脈順還三女寸關寸部皆相應一男一女分形證有時子死母身存或即母亡存子命往來三部通流利滑數相參皆替替陽實陰虛脈得明遍滿胸堂皆逆氣左手太陽浮大男右手太陰沉細女諸陽為男諸陰女指下分明長記取三部沉正等無疑尺內不止真胎婦母乘子兮縱氣露妻乘夫兮橫氣助子乘母兮逆夫參夫乘妻兮順氣護小兒日足胎成聚身熱脈亂無所苦汗出不食吐逆時精神結備其中住滑疾不散胎三月但疾不散五月母弦緊牢強滑者安沉細而微歸泉路妊娠雜病併產生死二歌余不能盡錄也血下如同月水來漏極胎乾主殺胎亦損妊母還須慮爭遣神丹救得回欲產之時脈離經沉細而滑也同名夜半覺痛應分誕來日日午定知生此歌與前歌皆出脈訣也調元陽虛右尺命門脈微細陽痿精清還少丹巨勝子丸陰虛左尺腎脈洪大或數遺精尿血淋澀等症丹溪大補陰丸補陰丸加味虎潛丸相火妄動陽事數舉右尺命門脈洪大此為水不勝火與陰虛同治法補陰則火自降也陰陽俱虛兩尺脈微弱無力真精清薄用八味丸補天丸調經先期者血熱四物加芩連之類過期者血虛四物加參耆白朮陳皮之類經水紫黑色及有塊者血熱四物加黃芩黃連香附之類若見腎肝脈遲微小腹冷痛者屬寒四物加炒乾姜之類將行而作疼者血實氣滯四物加醋炒莪朮玄胡索木香挾熱加黃連柴胡或四物加桃仁紅花香附之類行後而作疼者氣血俱虛八物湯經行不止四物加阿膠地榆荊芥穗之類安胎胎痛乃血少四物加童便制香附共為末紫蘇湯調下有所激觸而痛者芎歸湯探之胎動屬火四物加條芩之類胎動不安及下血集驗方秦艽湯胎動下血或因房室不節有所觸動四物加膠艾條芩白朮之類妊娠惡阻肥人有疾瘦人有熱胃氣不安人參橘皮湯保生湯集驗青竹茹湯懷胎不問幾個月日但覺胎氣不安腰腹微痛飲食不美用安胎飲便產妊娠七八個月恐胎氣展大難產宜服束胎丸妊娠八九個月肥厚膏粱之人胎氣壅隘宜服枳殼散間二三日一服或達生散救生散臨月用神寢丸三合濟生湯難產用催生丹遇仙丹如聖膏豬肝蜜酒法胎衣不下或血乾或血冷凝澀當用奪命丹牛膝湯或前方如聖膏一方用紅花一兩酒煮濃汁服一法令產婦自啣髮尾在口嘔噦即下轉女為男法受妊之後用弓弦一條絳囊盛帶婦人左臂近肩垂繫腰下滿百日去之雄黃一兩絳囊盛帶左邊斧一把置產婦床頭仍置刃床下勿令人知雞抱卵時置斧窠下皆雄雞也附方秘傳金鎖思仙丹治男子過多嗜欲精氣不固澀以去脫之劑也蓮花蕊十兩暖無毒鎮心忌地黃蒜石蓮子十兩味甘平溫無毒經秋正黑沉水者是也本功益氣安心止汗治腰痛泄精入藥內去青薏取淨粉雞頭實十兩味甘平無毒益精氣強志取其實並中子搗爛曝乾再搗篩取淨粉上以金櫻子三斤取霜後半黃者木臼中轉杵卻刺勿損擘為兩片去子水淘淨搗爛入大鍋內以水煎不絕火約水耗半取出濾過重煎如稀餳市肆乾者倍之用水浸軟去子煎令如法入前藥末和丸桐子大每服三十丸空心鹽湯下一月見效即不走泄候女人月信住取車前子一合水煎空心服之一交即孕依法服至多日精神完固能成地仙平時忌葵菜車前子按本草金櫻子味酸澀平無毒療脾泄澀精氣精氣滑脫者服之自固或言其性澀乃因無是病而用是藥且無配製而作煎單服者籲澀可去脫十劑之一法良工不能更其道也夫雞頭實味甘平無毒補中益精石蓮子味甘寒無毒安心神養氣力治泄精蓮花蕊暖無毒鎮心益顏色服餌家取雞頭實熬金櫻煎和丸補下益名水陸丹仙方取雞頭實並蓮實合餌食之能駐年昔人得其一二功效若此思仙合眾妙而有之信可尚矣玉鑰啟榮丸治女子無他疾經事調勻容顏不損但久無胎孕先師云婦人者眾陰之所集常與溫居今失所養則子宮有陰無陽不能生髮用此丸平調氣血鼓作微陽生育之要藥也人參白朮甘草當歸赤石脂川芎茯苓芍藥俱要白者熟地牡丹皮沒藥白芷藁本白薇玄胡索上各一兩除石脂沒藥另研外其餘用醇酒浸三日焙曬乾為細末足一十五兩香附去皮毛水醋浸三日炒乾為細末一十五兩上藥一十六味重羅極細末煉蜜丸如梧桐子瓷器中封固每服五十丸空心溫酒或白湯送下以乾物壓之待月事調勻受娠為度還少丹治右尺命門脈微細陽事痿弱精氣不足陽虛之證山藥牛膝去蘆酒浸遠志去心巴戟去心山茱萸去核茯苓五味蓯蓉杜仲炒去絲石菖蒲茴香各一兩枸杞熟地各一兩半楮實子一兩上為末煉蜜和棗泥丸如梧桐子大每服三五十丸溫酒或鹽湯送下日三服食前巨勝子丸治右尺命門脈虛微欲脫陽痿不舉陽脫之證熟地四兩生地牛膝酒洗川的枸杞甘州何首烏茯苓白的天雄炮天門冬去心柏子仁巴戟去心五味北者山藥楮實酸棗仁續斷各一兩韭子川椒蓮芯各五錢覆盆子一兩木香三錢半巫蓉一兩芡實五錢巨勝子菟絲子破故紙炒各一兩葫蘆巴五錢上焉末煉蜜丸桐子大每服七十丸甚虛者百丸空心溫酒下大補陰丸治左尺腎脈洪大或數遺精水血壯水之要藥黃柏鹽酒炒知母各四兩制同龜板酥炙熟地各六兩上為末煉