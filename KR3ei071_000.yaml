二錢去皮上為末以大黃膏同雞子白搗勻桐子大溫酒急吞五七丸如未下再用後方牛膝湯治婦人生理不順用此滑利水道令兒易產牛膝酒洗木通瞿麥當歸酒洗各一錢滑石二錢葵菜子一錢二分半如無用黃蜀葵花上銼分三服水二鍾煎八分溫服須先合預備廣嗣附方五子衍宗丸男服此藥添精補髓疏利腎氣不問下焦虛實寒熱服之自能平秘舊稱古今第一種子方有人世世服此藥子孫蕃衍遂成村落之說嘉靖丁亥於廣信鄭中丞宅得之張神仙四世孫予及數人用之殊驗枸杞子甘州菟絲子各八兩酒蒸搗餅車前子二兩揚淨五味子遼東二兩研碎覆盆子四兩酒洗去目上藥俱擇道地精新者焙曬乾共為細末煉蜜丸桐子大每服空心九十丸上床時五十丸白沸湯或鹽湯送下冬月用溫酒下修合日春取丙丁巳午夏取戊巳辰戌丑未秋壬癸亥子冬取甲乙寅卯忌師尼鰥寡之人及雞犬六畜見百子附歸丸女服此藥調經養血安胎順氣不問胎前產後月事參差有餘不足諸證悉皆治之殊益胎嗣比太僕史鮑璧台州人其妻年三十不生育忽經事不至者十月腹鼓大無病容皆謂妊娠一日忽產惡物盈褲視之皆敗痰精血後服此丸不期年生一子張云彼嘗以此二方與諸人服無不應者阿膠真的蛤粉炒成珠川芎去蘆當歸肥大者酒洗去蘆蘄艾去筋梗醋煮乾芍藥肥長白者熟地懷慶者去腦取沉水者各二兩香附赤心者去毛杵成米水醋各浸一宿曬焙乾一十二兩上為極細末用大陳榴一枚連皮搗碎東流水三升熬去滓打麵糊為丸桐子大每服百丸空心陳米醋點沸湯下日一服上二方亦俞子木所別傳者大造丸治男子女人一切虛弱不問老幼或稟氣素弱或斫喪太過陽事早痿面色痿黃形體尫羸口不能呼足不能任地或老年虛憊氣血俱衰或女人月水不調或常小產或多生女少生男凡是氣血虛損不足之症艱於嗣育者並宜服此當有奇效紫河車一具用米泔水洗淨新瓦上焙乾為末須初生男女為妙又法用銀器加淡酒水內蒸化入藥敗龜板年久者良童便浸三日酥炙黃二兩除腰背痠疼骨中寒熱生地黃懷慶肥大者二兩五錢入砂仁六錢白茯苓二兩稀絹包入銀罐內好酒煮乾添酒七次去茯苓砂仁只用地黃涼心火血熱除五心熱天門冬去心一兩二錢去熱養肌膚生津保肺氣牛膝去苗酒浸曬乾一兩二錢壯陽益精主腰脊疼痛除四肢拘攣杜仲酥炙去絲一兩五錢強腎壯筋骨益氣主腰疼人參去蘆一兩止渴生津和中益氣安神止驚悸夏月加五味子七錢一方加麥門冬去心一兩二錢男子遺精婦人帶下並加牡蠣一兩五錢婦人加當歸二兩去龜板上藥除地黃另用木石杵臼內春一日余藥各為末和地黃膏搗極勻酒米糊為丸如小豆大每服八九十丸空心鹽湯進一服寒月以好酒進亦妙神效墨附丸專治婦人久無子有經事不調及數墮胎者服之可立致效香附一斤要北方香附米去毛分四分浸一分好酒浸一分童便浸一分米泔浸一分醋浸各七日七夜艾綿四兩要潔淨無塵梗者用醋二大碗同香附一處煮乾石臼內約杵三千下以爛為度捻如餅子只錢樣厚用新瓦炭火焙乾搗為細末茯苓淨白者人參去蘆當歸酒浸一宿川芎去土大實者上徽墨火煆醋淬各一兩木香五錢要廣南者為真熟地黃用酒浸去土又以酒浸一宿飯上蒸過一兩上九味各為細末醋糊為丸如桐子大每服五十丸空心好酒下此方乃聞人道長所傳何首烏丸喬白岩服牛膝去苗梗生一斤何首烏三斤用銅刀或竹刀切作片上藥以黑豆一斗淘淨用甑一所先以豆薄鋪甑底後薄鋪何首烏又鋪豆又鋪牛膝重重鋪盡安於釜上蒸之令豆熟為度去豆取藥曝乾又換豆蒸之如此三次去豆取藥為末蒸棗肉為丸如桐子大每服三五十丸食前溫酒下忌蘿蔔蔥蒜何首烏乾者米泔水浸稍軟切之又方蕭東之傳云蔣敬所服此何首烏雌雄各半斤銅刀刮去粗皮為片米泔水浸夏一宿春秋二宿冬三宿取出曬乾為末無火病以棗肉為丸否則蜜丸清晨鹽湯下或酒下尤佳本草服何首烏用茯苓煎湯似勝鹽湯上二方楊後江掌科傳後江自服此連孕及人傳服者皆驗延年益嗣丹男子服生地黃酒浸二宿取出曬乾天門冬酒浸一二時取出去心曬乾熟地黃酒洗淨曬乾麥門冬酒浸一二宿取出去心曬乾各三兩地骨皮五兩酒洗淨曬乾白茯苓五兩去粗皮切作片酒浸過取出曬乾人參去蘆三兩上好者方用何首烏半斤鮮者用竹刀刮去皮切作片乾者用米泔水浸軟刮去皮切作片用砂鍋內下用烏羊肉一斤烏豆三合量著水上用竹篦放此藥後覆蓋蒸一二時辰取出曬乾共為細末煉蜜為丸如桐子大每服三五十丸用酒送下清晨服之崇德縣韓主簿傳加味益母丸婦人服川芎木香廣芍藥赤的當歸各一兩益母草半斤上為末煉蜜丸如桐子大每服五十丸用好酒或童便酒送下其妙如神服百丸有孕上二方余與荊妻親服有驗者加味養榮丸女人服之有孕且無小產之患當歸酒浸洗白朮各二兩芍藥煨黃芩炒香附子炒各一兩五錢貝母陳皮去白茯苓白人參麥門冬去心各一兩阿膠炒七錢甘草炙五錢川芎一兩半熟地酒浸二兩黑豆大者炒去皮四十九粒上為細末煉蜜丸如桐子大每服七八十丸食前空心鹽湯或溫酒任下忌食諸血四制香附丸當歸酒浸芍藥酒炒熟地薑汁炒川芎各四兩澤蘭葉白朮陳皮各二兩黃柏酒炒甘草酒炒各一兩香附一斤四兩醋四兩酒四兩鹽湯四兩童便各浸二日炒上為末酒糊丸桐子大每服七十丸空心白湯下調經養血順氣健脾信服有妊壬子丸依方修合此藥服之不過半月一月有孕試之屢見效故附錄乳香三兩白芨白蘞茯苓白淨吳茱萸各一兩牛膝細辛各五錢菖蒲當歸白附子各少許厚朴桂心沒藥人參各四兩上為細末煉蜜丸用壬子日修合如紅豆大每服十丸有效若男子服補益若孕婦服之即生雙始空心好酒送下無夫婦者不可服琥珀調經丸治婦人無子能令經正香附一斤一半童便一半醋各浸七日蘄艾四兩揀去枝梗加入香附攪勻再加好醋五碗入砂鍋內同煮乾為度日中曬乾磨為細末另加末藥當歸酒洗川芎芍藥煨各三兩琥珀一兩另研熟地酒蒸另杵入糊生地酒浸各二兩另杵入糊上為細末共一處搗極細同為丸用醋糊丸如桐子大每服一百丸空心艾醋湯送下濟陰丹當歸川芎各四兩香附一斤生乾地黃四兩去苗好大艾葉一斤去梗蘄艾尤妙赤芍藥四兩上分為四分一分醋浸一分童便浸一分鹽水浸一分酒浸俱各過一宿用醋三壺拌勻以砂鍋煮乾醋為度取出曬乾為末醋打麵糊為丸如桐子大一日三食食前每服五六十丸令人體壯經調有孕且服久諸病不作雛鳳丸用頭窠烏骨雞雌雄各一隻置放一處不可與群雞相混候生卵時將初生頭卵記放待生卵數足將初生卵頭巔開一竅用辰砂三錢當歸芍藥川芎熟地黃各二錢為細末將卵黃傾出和藥末仍入殼內以厚紙封之眾卵內覆之待群雞生將藥卵去殼以蜜丸之塗心好酒服三四十丸此極見效藥盡干有孕此方宣府鎮守總兵馬儀都督所傳香附丸又名煮附丸專宜妾婢蓋妾婢多郁情不宣暢經多不調故難孕此方最妙不須更服他藥以香附不拘多少去毛並粗皮米泔水浸一宿曬乾用上好米醋砂鍋內同煮之旋干旋添以煮透極爛為度取出焙乾為末仍用醋糊為丸如桐子大每服五七十丸經不調者即調久不孕者亦孕溫臍種子方白芷青鹽各二錢麝香一分五靈芝二錢上各為末以蕎麥麵湯和搓成條圈於臍上以前藥實於其條以艾灸之但臍內微溫即好不過二三度兜肚方升麻丁皮甘松各七錢白檀一兩零陵香五錢麝香九分白芷五錢木鱉八錢兜苓馬蹄香各五錢血竭五錢羚羊角一兩分作三個兜肚內以上共十二味用蘄艾綿絮裝於白綾兜肚內初服者用三日後一解至第五日復服至一月後常服專治痞積遺精白濁婦人赤白帶下及婦人經脈不調久不受孕者惟孕婦不可服益母草丸只一味為末不犯鐵器煉蜜丸如彈子大每服一丸久服亦令人有子此先祖蘭窗公所常施而有驗者其婦人胎前產後諸疾治不無效服法備載於積堂方中在前冊妊婦五忌崑山顧狀元刊施二法一勿睡熱炕南方火廂亦同一勿飲燒酒黃酒有藥者亦不宜飲一勿食煎炒炙煿之物一勿食蔥韭蒜薤胡椒茱萸一勿於星月下仰臥及當風洗浴坐臥小兒五宜一小兒初生先煎濃黃連甘草湯急用軟絹或絲綿包指蘸藥摳出口中惡血倘或不及即以藥湯灌之待吐出惡沫方與乳吃令出痘稀一初生三五月宜繃縛令臥勿豎頭抱出免致驚癇一乳與食不宜一時混吃兒生疳癖痞積一宜用七八十歲老人舊裙褲改小兒衣衫令兒有壽雖富貴之家切不可新制紵絲綾羅氈絨之類與小兒穿不惟生病抑且折福愚意滿月受賀宴賓宰殺亦恐不宜一兒生四五個月止與乳吃六個月以後方與稀粥哺之周歲以前切不可吃葷腥並生冷之物令兒多疾若待二三歲後腑臟稍壯才與葷腥最好最好延生第一方鎮江錢醫宮傳小兒初生臍帶脫落後取置新瓦上用炭火四圍燒至煙將盡放土地上用瓦盞之類蓋之存性研為末預將硃砂透明者為極細末水飛過臍帶有五分重硃砂用二分五釐生地黃當歸身煎濃汁一二蜆殼調和前兩味抹兒上臊間及乳母乳頭上一日之內晚至盡次日大便遺下穢汙之物終身永無瘡疹及諸疾生一子得一子十分妙法也臍與硃砂重輕對半放神功消毒保嬰丹凡小兒未出痘瘡者每遇交春分秋分時服一丸其痘毒能漸消化若只服一二次者亦得減少若服三年六次其毒盡能消化必保無虞此方神秘本不欲輕傳但慈幼之心自不能已願與四方好生君子共之纏豆藤一兩五錢其藤八月間收取毛豆梗上纏繞紅絲者便是採取陰乾此藥為主妙在此藥黑豆三十粒赤豆七十粒荊芥防風川獨活各五錢黃連桔梗甘草當歸酒洗赤芍藥各五錢山楂取肉辰砂水飛另研生地各一兩連翹新升麻各七錢半牛蒡子一兩紙炒過苦絲瓜二個長五寸隔年經霜方妙可燒灰存性為極細末上各為細末和勻淨砂糖拌丸李核大每服一丸濃煎甘草湯化下其前項藥須預辦精料遇春分秋分或正月十五日七月十五日修合務在精誠忌婦人貓狗見合時向太陽祝藥曰神仙真藥體令自然嬰兒吞服天地齊年吾奉太上老君急急如律令敕一氣七遍凡沿初生小兒口內並牙齦生白點者名馬牙不能食乳此與鵝口不同少緩即不能救多致夭傷急用針縛筋上將白點挑破出血用好京墨薄荷湯以手指碾母油發蘸墨遍口內擦之勿令食乳待睡一時醒方與乳再擦之即愈牛黃抱龍丸此屢服屢驗方治一切急慢驚風及風熱風癡用薄荷煎湯磨服一丸兒小作二三次服茯苓雄黃人參各一錢半殭蠶三分膽南星八錢鉤藤一兩半辰砂一錢二分天竺黃二錢五分另將牛黃二分麝香五分同研極細入前藥末內又精研俟將甘草四兩銼碎用水二大碗煎成膏一盞入藥末內丸如芡實大金箔為衣陰乾藏之勿令泄氣每近微火邊上附方乃自驗及人所服驗皆秘方也茲其闡錄以廣前方之所未備蓋人之稟養不齊病亦隨異故方各有宜擇而用之則罔不效矣其保嬰數方後嗣之道也因並附焉去胎毒仙方懷孕後值夏秋天暖吞生綠豆每日七粒石菖蒲湯送下並能去胎瘋每日七粒以四十九粒為度愈多愈好四精膏除赤障熱痛蜂蜜花之精人乳人之精青魚膽水之精羯羊膽草之精上等分用瓷盞盛貯在飰上蒸熟入瓷瓶中將黃蠟油紙封固懸掛井中七日取起點眼甚妙以匙挑出少許嚥下亦可又海上方昔日一官往揚州府到任雙目不明屢醫無效偶爾一道人傳一仙方要擇於冬至日摘桑葉一百四十葉若樹上無葉有落在地下者撿起收用亦好照依後開日期每日用葉十片水一碗煎至八分澄清溫洗洗目之日戒酒除葷忌房事如不忌不效洗至一年明如童目經驗屢效續將此方傳於四方患眼之士仍候冬至日取摘桑葉照依前法制造救了六七百人有九十老者洗眼一年亦如童子刊刻傳施萬千陰隲莫大之功行也洗眼日期正月初八二月初十三月初五四月初八五月初五六月初六七月初七八月初三九月初三十月十九二十十一月初十十二月二十一二十二絕妙烏須方非他方可比樂庵道人傳用烏骨白雄雞一隻取血入瓷瓶內然後取螞蝗一百條入水中養二十七日取出俱要活的又用京墨一兩打碎放盞內少放水坐水鍋中煮化開傾入雞血內隨將螞蝗同入封固瓶口一個月後再入水銀三錢硼砂三錢再封固一月其色如漆用時先將皂角水洗淨須次用豬膽皮套二指蘸藥捻鬚稍直黑到根神仙通氣散至真至妙非他方可比蛤蚧一對要全者炙母丁香二錢沉香二錢胡椒五錢大茴香五錢廣木香三錢麝香一錢共為細末用大淡蝦米一斤淨取半斤用好燒酒半杓浸透滾藥末在上入瓷罐盛之再加好燒酒入罐浸之慢火煮六七個時辰候冷定取出曬乾收貯勿令出氣行房時用好酒送下二三枚後用淡醋湯解之鸞鏡法硃砂硇砂硼砂雌黃雄黃硫黃銅綠無名異上八味各等分硫黃減半同研極膩用龜尿無則好醋調研描畫人物詩句在鏡上即用稻草火燒鏡以鏡背有水珠為度埋藏土中去火氣冷定取出磨淨如有人物模樣古鏡不可百病紫霞丹清氣化痰寬胸除穢止嘔吐安五臟其功不可盡述沉香丁香甘松廣木香各三錢薄荷一兩砂仁檀香白豆蔻白百藥煎各五錢硼砂五錢共為細末粉草半斤切碎用水十餘碗浸一宿次日入鍋內煎五七沸濾去滓止用汁熬用膏取出碗內入桂花膏一兩冰片一錢調勻將前藥末和勻如黍米大入口噙化一丸治牙疼方用冰片半分硃砂半分擂勻擦患處治喉痛方取牛膝白根同米泔水搗汁以口嗽之即吐久之其痛自止根赤者不用治腫毒在上食遠在下空心服軟石膏硬石膏紫河車各五錢金線重樓者便是上三味如男生諸腫女人手一順同酒擂之以醉為度女人生腫男子擂服順擂再不可逆妙全在此河車價亦不貴酒宜熱服治小腸疝氣方升上疼者服此即止取龜尾草焙乾煅灰存性加何首烏葉亦煅灰二味一大撮煮酒空心送下甚者不過二三服治腫毒方如腫毒初起見其勢凶即將雞子敲入一鍾井花水內攪勻食之甚者五六次即內消矣治臟毒方人參一錢五分臺術微炒枳殼炒黃連炒地榆芍藥白者陳皮炒槐花炒末各一錢甘草五分烏梅七個搗碎扁柏頭七枝椿樹根皮朝東南者一撮共作一服上水二大鐘煎八分空心與食前服渣再煎清氣化痰丸南星半夏各五兩生薑皂角白礬亦各五兩用河水煮一晝夜揀去姜礬皂莢只用南星半夏切片陰乾後加枳實炒江西的橘紅五兩黃連炒黃芩炒各五兩茯苓白二兩甘草生二兩栝蔞仁去殼研去油如泥去油夾草紙打杏仁湯泡去皮尖去油研如泥亦前法各二兩上為細末用蒸餅打薄薄糊丸如綠豆大每服一錢五分食遠與臨睡時白滾湯下清茶亦可十全大補湯能治諸虛人參黃耆白朮炒茯苓各一錢生地當歸黃連炒各七分甘草五分肉桂三分川芎五分上㕮咀水二鍾煎八分食前服白濁方左共四方紫泉兄傳於盛丸有驗者也破故紙五錢罌粟米二錢五分倘不愈倒數目服之上二味炒為細末空心白滾湯下好酒亦可治心痛方驗過用花鹼三錢將熱煮酒半鍾攪勻乘熱服即散治諸般頭痛方亦春丸方分兩不可瘥防風羌活藁本細辛軟柴胡各八分黃芩酒沙白芷天麻各一錢川芎一錢五分白芍藥酒浸炒一錢半夏薑汁製七分姜三片上水二鍾煎八分食遠服不拘遠近服之即愈治癬方川槿皮君白芨臣剪草佐巴豆使為末擦之又方先用穿山甲扒去蓋然後取水搽上甘草川槿皮各一兩上二味用梅水浸於瓶中五六日箸頭扎布擦之藥蠅方鬥嵎傳梨蘆剪草用白酒同飰浸一宿去酒留飰蠅食即死治豬瘟方川烏草烏白芷蒼朮豬牙皂角上藥等分為細末用蘆吹入鼻中嚏之即愈附論一篇論童壯未弱冠為童過三十為壯夫壽夭貧富天也去就邪正人也共叔段以母偏愛而失身於不法孟母三遷而孟子終為亞聖今夫少者甜處著嘴穩處著腳不趨過庭之訓復厭舞雩之風讒師佞友左右瞰亡蕭牆夾壁沽酒市脯困極告醫惟務速效怨天尤人莫知反躬孟子曰學問之道無他收其放心而已心神守舍則飢渴寒溫之外自不多事也孔子曰人之少也血氣未定戒之在色古法以男三十而婚女二十而嫁又當觀其血色強弱而抑揚之察其稟性淳漓而權變之則無曠夫怨女之瘵也孔子曰及其壯也血氣方剛戒之在鬥夫鬥者非特鬥狠相持為鬥胸中才有勝心即自傷和學未明而傲養未成而驕志不行則鬱而病矣自暴自棄言不及義而狂矣孟子曰由仁義行非行仁義也如欲行仁義以求安樂者吾見其為不安樂也此少壯攝養之道棄此大道而別求傍蹊曲徑以資分外者必致廢事蕩家而怪誕無恥也大抵血氣盛壯之時難以制抑凡事當先知心是吾之靈明主人一切好欲欺侮凌奪肆恣皆是血氣所使倘犯刑名災害明是主人自取苦辱也常作此想者自然漸成古今修性養命之術恐名利之士難行並不抄入凡除夏日之外五日一沐十日一浴若頻浴則外覺調暢而內實散氣泄真也年二十者必不得已則五日一施泄三十者十日一施泄四十者一月一施泄其人弱者更宜慎之毋恣生藥以貽父母之憂而自取枉夭之禍能保始終者卻疾延年老當益壯名曰陸地行仙雖有貧富之異而榮衛沖融四時若春比之抱病而富且貴則已霄壤之間矣況能進進不已則非常人所可知也但於名利場中得失任命知止知足則漸入道鄉也道者非特寂寂枯槁之謂也如所謂素富貴則行此道於富貴素貧賤則行此道於貧賤爾關尹子曰圓爾道方爾德平爾行銳爾事孔子曰志於道據於德依於仁遊於藝故內外三聖之言未嘗不契蓋藝為應世之術故曰銳利乃事仁為泛愛之常故曰平爾行德方則不移而有所得於心有所據於事道圓則通而不執故無所不容而德行廣大志無不在也何嘗盡廢諸事然後謂之攝養哉特消息否泰而行之藏之量其才能而負之荷之以不流於物故謂之攝以安其分故謂之養抱朴子云若才不逮而強思力不勝而強舉深憂重恚悲哀憔悴喜樂過度汲汲所欲慼慼所患談笑不節興寢失時挽弓引弩沉醉嘔吐飽食即臥跳走喘乏懽呼哭泣皆為過傷此古人所戒之文況夫風前月下竹徑花邊俯仰傷懷杯余疏散進退失度或沖煙冒瘴以求榮呼吸雜邪停留寵辱飲食共味荏苒暴患各有治條當斯之時即迴光返照少駐元神以行藥力毋復縱聰明以凌爍粗工而自取多事也嗚呼三皇大聖日總萬機而又能拳拳於天下民瘼下禮折節於方外士而講道論醫以廣其傳今之學者一身未知所以自治而以人治之則孰為多乎而況又欲為治人者難矣哉余嘗作返樸論其辭有云倏與忽欲報混沌之德而相與謀曰人皆有七竅以為食息而混沌獨無嘗試鑿一竅七日而混沌死有客對余曰吾有術以起混沌之死但一年修一竅七年而混沌復生余曰固哉之學也何以為誇尚乎吾能以一息回混沌之生而息息與之俱生故視斯明聽斯聰言斯辯而余未嘗以有視聽與言而人亦未嘗以余為聰明與辯固不補其鑿而混沌自全夫是之謂聰明與辯高明之士能於此處具眼則養生必有主也不攝之方並類其次論衰老少年既往歲不我與孔子曰及其老也血氣既衰戒之在得蓋因馬念車因車念蓋未得則慮得之亦慮失之趑趄囁嚅而未決寤寐驚悸而不安夫二五之精妙合而凝兩腎中間白膜之內一點氣動大如箸頭鼓舞變化開闔周身熏蒸三焦消化水穀外御六淫內當萬慮晝夜無停八面受攻由是神隨物化氣逐神消榮衛告衰七竅反常啼號無淚笑如雨流鼻不嚏而涕出耳無聲而蟬鳴吃食口乾寐則涎溢溲不利而自遺便不通而或泄由是真陰妄行脈絡疏澀晝則對人瞌睡夜則獨臥惺惺故使之導引擦摩以通徹滯固嗽津咽液以灌溉焦枯若扣齒集神而不能斂念一曝十寒而徒延歲月雖云老者非肉不飽肥則生風非帛不暖暖則多淫僥倖補藥者如油盡添油燈焰高而速滅老子云以其厚生所以傷生也況有明修禮貌暗伏奸雄曲糵腐其腸胃脂粉惑其清真孤陽獨盛水穀易消自恃飲啖過人恣造欺天之罪宿緣既盡惡報臨頭其或厭飫沉酣身居勤儉志益貪婪方聚龜毛之壇忽作女子之夢宋齊丘化書云慳吝者化為狗暴勇者化為虎雖然身未遷謝業已成行矣先賢詩云克己工夫未肯加吝驕封閉縮如蝸試於靜夜深思省剖破藩籬即大家先賢戒曰積金以遺子孫子孫未必能守積書以遺子孫子孫未必能讀不如多積陰隲於冥冥之中以為子孫長久之計龐居士詩云北宅南莊不足誇好兒好女眼前花忽朝身沒一丘土又屬張三李四家張紫陽詩云人生雖有百年期壽夭窮通莫預知昨日街頭方走馬今朝棺內已眠屍妻財遺下非君有罪業將行難自欺大藥不求難得遇遇之不煉更迷癡蓋年老養生之道不貴求奇先當以前賢破幻之詩洗滌胸中憂結而名利不苟求喜怒不妄發聲色不因循滋味不耽嗜神慮不邪思無益之書莫讀不急之務莫勞三綱五常見成規模貧富安危且據見定邵康節云美酒飲教微醉後好花須看半開時又云爽口物多終作疾快心事過必為殃與其病後求良藥孰若病前能自防又詩云慮少夢自少言稀過亦稀簾垂知日永柳靜覺風微但看花開謝不言人是非何須尋洞府度世也應遲龐居士云但願空諸所有慎勿實諸所無余有詩云世人用盡機關只為貪生怕死我有安樂法門直須顛倒於此晉有祁孔賓夜間讀書忽聞窗外云祁孔賓隱去來修飾人間事甚苦不堪偕所得未毫銖所喪如山崖晁文元公法藏碎金云眾所好者虛名客氣宄其羨財予所好者天機道眼法要度門又云觀身無物從幻化緣生觀心無物從顛倒想生又云身有安全敗壞者事之報也即世而可見性有超升淪墜者行之報也異世而不知譬如形聲之有影響必然之理也又云人有疾苦或多偶爾非因所作無如之何歷觀幻化之軀而有甚於此者能推此理足以自寬又云仕宦之間暗觸禍機袵席之上密涉畏途輪迴之中枉入諸趣古人云心死形方活心強身即亡金剛經云云何降伏其心川老子須云你喜我不喜君悲我不悲雁飛思塞北鶯憶舊巢歸秋月春花無限意箇中只許自家知虛靜天師云靈岩皎潔似冰壺只許元神裡面居若向此中留一物平生便是不清虛老子云虛其心實其腹是皆融智慧黠聰明而宅天和以卻百邪者也豈比夫三千六百傍門小法加之於萬境煎熬之心而頭上安頭又以金石草木剛烈之劑餌之於喪津枯涸之體而求補益哉歷觀前人以不仁成家以仁而保家者有之矣如以不仁而得復以不仁而守者禍不旋踵也晉書傳云石季龍僭稱帝號發近郡男女十六萬車十萬乘運土築華林園揚州送黃鵠雛五頸長一丈聲聞十餘里泛舟於玄武池命子石宣祈于山川因而遊獵乘大輅羽葆華蓋建天子旌旗十有六軍戎卒十八萬出自金明門季龍從其後宮升凌霄觀望之我家父子如是自非天崩地陷當復何愁但抱子弄孫日為樂耳宣所過三州十五郡資儲靡有孑遺季龍覆命子石韜亦如之出自幷州遊於秦晉宣所惡韜寵是行也嫉之彌甚於是相圖之計起矣俄而宣使刺客殺韜於佛舍又欲謀不軌事發季龍殺之季龍既死其後殲焉嗚呼季龍之富貴而不足恃而今之碌碌者十百之帑又奚足以作威福而造業因哉今雖枯槁幽棲而衣冠出處未嘗用餕餡故事以孔子之性與天道不可得而聞也故託佛以言性耳佛云一切山河天地皆從如來性中流出然則佛之一字乃一切有情之覺靈也實為大羅空劫先天之祖氣即元始天尊是也人人皆抱此靈而不自覺故佛經云一切眾生本來成佛以不覺故名曰眾生以覺故名曰佛今之地獄變相乃唐太宗以入冥境界命宰相閻立本圖畫以示世人余少年滑稽之時未嘗不在談笑之下一日在外因病困極恍惚所見與吾家骨肉所夢同日境界因緣無有少異遂絕口不敢戲謔後讀史傳語錄文字始知近代以來王公卿士於佛書中獲大安樂者不可枚舉故韓昌黎排之至甚而終得法於大顛歐陽文忠公惡之如仇敵而亦號為六一居士豈非自有所得翻然而改者歟悲夫世人不明佛心而溺於佛事故梁武帝之禍侯景至而不知秦始皇欲仙徐福去而不返況夫瑣瑣勝事而能勝其業障乎夫業障之心以酒為漿以妄為常念念遷謝晝夜呼吸共一萬三千五百息一息脈行三十元氣周身脈行八百一十丈寒來暑往知誘物迷神明流之遠矣養生之士以此為主則是認賊為子豈不謬哉故岐伯曰出入廢則神機化滅升降息則氣立孤危易曰精氣為物遊魂為變是也昔有二人就余以辯生死事大者一曰人之有生也賦性於天養命於地百年之身仁義而已及其終也清魂歸天濁魄歸地夫復何疑二曰人之生也以身為我以得為強以妄為常蟲穢之倉愁慮之囊或為之讓或為之攘均為孳孳一名殘忍一名忠良拘之則心目外寇縱之則血氣內戕欲持其要莫知所長業識茫茫一息不來烏知其何往余各以一詩遣之其一曰原始要終理不訛四非莊敬怕蹉跎平生不踐中庸地一曲陽關沒奈何其二曰超凡一句絕商量說破教君笑斷腸一切順違生死事莫令厭戀作心王有人能如此便見養生王也大抵桑榆之景勞逸不同蓋勞心者甚於勞力者耳蓋為心王者勞亦如是逸亦如是如魚飲水冷暖自知也其餘扶衰潤槁之方各類於後上夫扶衰潤槁之方與前所云不攝之方備見養生主論茲不具錄
